name: Build Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Haxe 4.3.6
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.6

      - name: Cache haxelibs
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
          key: haxelib-picoengine-${{ hashFiles('Project.xml') }}
          restore-keys: haxelib-picoengine-

      - name: Install haxelibs
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp         --quiet
          haxelib install lime          --quiet
          haxelib install openfl        --quiet
          haxelib install flixel          5.6.1 --quiet
          haxelib install flixel-addons   3.2.2 --quiet
          haxelib install tjson           1.4.0 --quiet
          haxelib install flxanimate            --quiet
          haxelib install hscript-iris    1.1.3 --quiet
          haxelib git extension-androidtools https://github.com/MAJigsaw77/extension-androidtools --quiet

      - name: Setup Android SDK & NDK
        run: |
          # Install SDK command-line tools
          sudo apt-get install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools"            >> $GITHUB_PATH

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk/ndk/25.2.9519653
          key: ndk-25.2.9519653

      - name: Install Android SDK packages & NDK r25
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup lime for Android
        run: |
          printf '%s\n' \
            "$ANDROID_HOME" \
            "$ANDROID_NDK_HOME" \
            "$JAVA_HOME" \
            "31" \
          | haxelib run lime setup android

      - name: Build Android (release)
  run: haxelib run lime build android -release --haxeflag=--macro --haxeflag="include('import')"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PicoEngine-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          
